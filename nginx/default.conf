server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;
    charset utf-8;
    client_max_body_size 1m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    location = /projects {
        try_files /projects.html =404;
    }

    location = /projects/ {
        try_files /projects.html =404;
    }

    location / {
        try_files $uri.html $uri $uri/index.html =404;
    }

    location ~* ^/_next/static/.+\.(?:js|css|woff2?|ttf|eot|otf)$ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        try_files $uri =404;
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache" always;
    }

    location ~ /\.(?!well-known(?:/|$)) {
        access_log off;
        log_not_found off;
        return 404;
    }

    location ~* ^/(xmlrpc\.php|wp-login\.php|wp-admin(?:/|$)|wp-content(?:/|$)|wp-includes(?:/|$)) {
        return 404;
    }

    location ~* \.php$ {
        return 404;
    }

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy same-origin always;
    add_header Cross-Origin-Resource-Policy same-origin always;
}
